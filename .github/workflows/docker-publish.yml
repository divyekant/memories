name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: divyekant/memories

jobs:
  build-and-push:
    name: Build and push — ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        target: [core, extract]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${{ matrix.target }}" == "core" ]]; then
            SUFFIX=""
            STABLE_TAG="latest"
          else
            SUFFIX="-extract"
            STABLE_TAG="extract"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"          # strip leading 'v'
            MAJOR_MINOR="${VERSION%.*}"     # e.g. 5.0 from 5.0.1
            TAGS="${IMAGE}:${VERSION}${SUFFIX},${IMAGE}:${MAJOR_MINOR}${SUFFIX},${IMAGE}:${STABLE_TAG}"
          else
            # main branch or manual dispatch → edge channel
            TAGS="${IMAGE}:edge${SUFFIX}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
