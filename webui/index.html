<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Memories</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/static/styles.css">
  <script>
    // Immediate theme application to prevent flash of wrong theme
    (function() {
      var saved = localStorage.getItem("memories-theme");
      if (saved === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      } else if (saved === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      } else {
        // System preference
        var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", prefersLight ? "light" : "dark");
      }
    })();
  </script>
</head>
<body>
  <div id="app" class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">Memories</div>

      <nav class="sidebar-nav">
        <a href="#/dashboard" class="nav-item" data-page="dashboard">
          <span class="nav-icon">&#9670;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#/memories" class="nav-item" data-page="memories">
          <span class="nav-icon">&#9672;</span>
          <span class="nav-label">Memories</span>
        </a>
        <a href="#/extractions" class="nav-item" data-page="extractions">
          <span class="nav-icon">&#8645;</span>
          <span class="nav-label">Extractions</span>
        </a>
        <a href="#/keys" class="nav-item" data-page="keys">
          <span class="nav-icon">&#9919;</span>
          <span class="nav-label">API Keys</span>
        </a>
        <a href="#/health" class="nav-item" data-page="health">
          <span class="nav-icon">&#9829;</span>
          <span class="nav-label">Health</span>
        </a>
        <a href="#/settings" class="nav-item" data-page="settings">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="theme-switcher">
          <button class="theme-btn" data-theme-choice="system" title="Follow system preference">System</button>
          <button class="theme-btn" data-theme-choice="dark" title="Dark theme">Dark</button>
          <button class="theme-btn" data-theme-choice="light" title="Light theme">Light</button>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Main area -->
    <div class="main-area">

      <!-- Topbar -->
      <header class="topbar">
        <button id="menuBtn" class="menu-btn" aria-label="Menu">&#9776;</button>
        <h1 id="pageTitle" class="topbar-title">Dashboard</h1>
        <div class="topbar-actions">
          <span id="apiKeyStatus" class="topbar-key-status" title="API key status">No key</span>
          <input id="globalSearch" type="search" class="topbar-search" placeholder="Search...">
        </div>
      </header>

      <!-- Content -->
      <div id="content" class="content-area"></div>

    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div id="modalContent" class="modal-content"></div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/ui/static/app.js" type="module"></script>
</body>
</html>
