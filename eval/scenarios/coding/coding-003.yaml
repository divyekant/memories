name: "Use project-specific test fixture"
description: "Agent must recommend the custom 'hvt_client' fixture — an abbreviated internal name that cannot be derived from 'Voltis'."
memories:
  - text: "Voltis test convention: Always use the 'hvt_client' pytest fixture for API endpoint tests, never the standard FastAPI TestClient directly. The hvt_client fixture auto-configures multi-tenant context, injects test API keys, and seeds the rate limiter. Tests using bare TestClient pass locally but fail in CI because tenant_id is missing."
    source: eval/coding-003
