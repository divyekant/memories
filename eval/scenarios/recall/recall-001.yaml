id: recall-001
category: recall
name: "Recall architectural decision with rationale"
description: "Voltis chose SQLite for local job queues instead of Redis."
memories:
  - text: "Voltis architecture decision ADR-007 (2026-01-15): Use SQLite for the local job queue instead of Redis. Rationale: (1) eliminates external dependency for single-node deploys, (2) ACID guarantees simplify retry logic, (3) team has deep SQLite expertise. Trade-off: won't scale to multi-node without migration to Redis later."
    source: eval/recall-001
prompt: "Why does the Voltis project use SQLite for the job queue instead of Redis?"
expected:
  - type: recall_accuracy
    description: "Agent accurately recalls: (1) it was a deliberate decision (ADR-007), (2) at least 2 of the 3 rationale points, (3) acknowledges the trade-off"
    weight: 1.0
