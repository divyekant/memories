id: compounding-001
category: compounding
name: "Synthesize rate limits and shed mode to diagnose latency"
description: "Agent must combine free-tier limit (1,200/min) with shed threshold (73%) to explain 200ms spikes at 900 req/min."
memories:
  - text: "Voltis API rate limits: Free tier = 1,200 requests/minute, Pro tier = 12,000 requests/minute, Enterprise = unlimited. Rate limit headers: X-Vtx-Remaining, X-Vtx-Reset."
    source: eval/compounding-001
  - text: "Voltis free-tier accounts enter 'shed mode' when usage exceeds 73% of their rate limit. In shed mode, the API returns header X-Vtx-Shed: true and adds ~200ms latency to all responses. To exit shed mode, usage must drop below 60% for a full window. Implement client-side rate smoothing to stay below 73%."
    source: eval/compounding-001
prompt: "A Voltis free-tier customer reports intermittent 200ms latency spikes. They make about 900 requests per minute. What's causing this?"
expected:
  - type: contains
    value: "1,200"
    weight: 0.3
  - type: contains
    value: "shed"
    weight: 0.4
  - type: contains
    value: "73%"
    weight: 0.3
