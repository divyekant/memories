name: memories-eval

# Isolated eval instance — runs on different ports with a data copy.
# Production instance on 8900/6333 is untouched.

services:
  qdrant-eval:
    image: qdrant/qdrant:v1.15.4
    container_name: qdrant-eval
    restart: unless-stopped
    ports:
      - "127.0.0.1:6335:6333"
      - "127.0.0.1:6336:6334"
    volumes:
      - qdrant-storage-eval:/qdrant/storage

  memories-eval:
    build:
      context: .
      target: ${MEMORIES_IMAGE_TARGET:-extract}
      args:
        ENABLE_CLOUD_SYNC: "false"
        PRELOAD_MODEL: "false"
    image: memories:eval
    container_name: memories-eval
    restart: unless-stopped
    depends_on:
      - qdrant-eval
    mem_limit: ${MEMORIES_MEM_LIMIT:-3g}
    ports:
      - "8901:8000"
    volumes:
      - ./data-eval:/data
    environment:
      - DATA_DIR=/data
      - API_KEY=${API_KEY:-god-is-an-astronaut}
      - MODEL_NAME=all-MiniLM-L6-v2
      - QDRANT_URL=http://qdrant-eval:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=memories
      - QDRANT_WAIT=${QDRANT_WAIT:-true}
      - QDRANT_WRITE_ORDERING=strong
      - QDRANT_READ_CONSISTENCY=majority
      - QDRANT_REPLICATION_FACTOR=${QDRANT_REPLICATION_FACTOR:-1}
      - QDRANT_WRITE_CONSISTENCY_FACTOR=${QDRANT_WRITE_CONSISTENCY_FACTOR:-1}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-onnx}
      - EMBED_MODEL=${EMBED_MODEL:-}
      - MAX_BACKUPS=10
      - EXTRACT_PROVIDER=${EXTRACT_PROVIDER:-}
      - EXTRACT_MODEL=${EXTRACT_MODEL:-}
      - EXTRACT_TRAINING_DATA_DIR=${EXTRACT_TRAINING_DATA_DIR:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - CHATGPT_REFRESH_TOKEN=${CHATGPT_REFRESH_TOKEN:-}
      - CHATGPT_CLIENT_ID=${CHATGPT_CLIENT_ID:-}
      - EXTRACT_FALLBACK_ADD=${EXTRACT_FALLBACK_ADD:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - USAGE_TRACKING=${USAGE_TRACKING:-}
      - AUDIT_LOG=${AUDIT_LOG:-false}
      - MAINTENANCE_ENABLED=${MAINTENANCE_ENABLED:-false}
      - EXTRACT_FALLBACK_MAX_FACTS=${EXTRACT_FALLBACK_MAX_FACTS:-1}
      - EXTRACT_FALLBACK_MIN_FACT_CHARS=${EXTRACT_FALLBACK_MIN_FACT_CHARS:-24}
      - EXTRACT_FALLBACK_MAX_FACT_CHARS=${EXTRACT_FALLBACK_MAX_FACT_CHARS:-280}
      - EXTRACT_FALLBACK_NOVELTY_THRESHOLD=${EXTRACT_FALLBACK_NOVELTY_THRESHOLD:-0.88}
      - MALLOC_ARENA_MAX=${MALLOC_ARENA_MAX:-2}
      - MALLOC_TRIM_THRESHOLD_=${MALLOC_TRIM_THRESHOLD_:-131072}
      - MALLOC_MMAP_THRESHOLD_=${MALLOC_MMAP_THRESHOLD_:-131072}
      - EMBEDDER_AUTO_RELOAD_ENABLED=${EMBEDDER_AUTO_RELOAD_ENABLED:-true}
      - EMBEDDER_AUTO_RELOAD_RSS_KB_THRESHOLD=${EMBEDDER_AUTO_RELOAD_RSS_KB_THRESHOLD:-1200000}
      - EMBEDDER_AUTO_RELOAD_CHECK_SEC=${EMBEDDER_AUTO_RELOAD_CHECK_SEC:-15}
      - EMBEDDER_AUTO_RELOAD_HIGH_STREAK=${EMBEDDER_AUTO_RELOAD_HIGH_STREAK:-3}
      - EMBEDDER_AUTO_RELOAD_MIN_INTERVAL_SEC=${EMBEDDER_AUTO_RELOAD_MIN_INTERVAL_SEC:-900}
      - EMBEDDER_AUTO_RELOAD_WINDOW_SEC=${EMBEDDER_AUTO_RELOAD_WINDOW_SEC:-3600}
      - EMBEDDER_AUTO_RELOAD_MAX_PER_WINDOW=${EMBEDDER_AUTO_RELOAD_MAX_PER_WINDOW:-2}
      - EMBEDDER_AUTO_RELOAD_MAX_ACTIVE_REQUESTS=${EMBEDDER_AUTO_RELOAD_MAX_ACTIVE_REQUESTS:-2}
      - EMBEDDER_AUTO_RELOAD_MAX_QUEUE_DEPTH=${EMBEDDER_AUTO_RELOAD_MAX_QUEUE_DEPTH:-0}
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,urllib.request; req=urllib.request.Request('http://localhost:8000/health/ready', headers={'X-API-Key': os.environ.get('API_KEY', '')}); sys.exit(0 if 200 <= urllib.request.urlopen(req, timeout=3).getcode() < 400 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  qdrant-storage-eval:
